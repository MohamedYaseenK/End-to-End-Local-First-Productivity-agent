<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productivity Agent — App Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f1117;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  h1 {
    color: #e2e8f0;
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  p.sub {
    color: #64748b;
    font-size: 13px;
    margin-bottom: 32px;
  }

  svg {
    width: 100%;
    max-width: 680px;
  }

  .t  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #e2e8f0; font-weight: 400; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #94a3b8; font-weight: 400; }
  .th { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #e2e8f0; font-weight: 500; }

  .c-gray   > rect { fill: #2c2c2a; stroke: #5f5e5a; }
  .c-gray   .th    { fill: #d3d1c7; }
  .c-gray   .ts    { fill: #b4b2a9; }

  .c-purple > rect { fill: #26215c; stroke: #534ab7; }
  .c-purple .th    { fill: #cecbf6; }
  .c-purple .ts    { fill: #afa9ec; }

  .c-teal   > rect { fill: #04342c; stroke: #0f6e56; }
  .c-teal   .th    { fill: #9fe1cb; }
  .c-teal   .ts    { fill: #5dcaa5; }

  .c-amber  > rect { fill: #412402; stroke: #854f0b; }
  .c-amber  .th    { fill: #fac775; }
  .c-amber  .ts    { fill: #ef9f27; }

  .c-blue   > rect { fill: #042c53; stroke: #185fa5; }
  .c-blue   .th    { fill: #b5d4f4; }
  .c-blue   .ts    { fill: #85b7eb; }

  .c-coral  > rect { fill: #4a1b0c; stroke: #993c1d; }
  .c-coral  .th    { fill: #f5c4b3; }
  .c-coral  .ts    { fill: #f0997b; }

  .c-green  > rect { fill: #173404; stroke: #3b6d11; }
  .c-green  .th    { fill: #c0dd97; }
  .c-green  .ts    { fill: #97c459; }

  .node { cursor: pointer; transition: opacity 0.15s; }
  .node:hover { opacity: 0.8; }

  .arr { stroke: rgba(255,255,255,0.2); stroke-width: 1.2; fill: none; }
</style>
</head>
<body>

<h1>Productivity Agent — Application Flow</h1>
<p class="sub">Local-first · privacy-preserving · personal productivity</p>

<svg viewBox="0 0 680 840" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer labels -->
<text class="ts" x="22" y="52"  text-anchor="middle" transform="rotate(-90,22,52)"  style="font-size:10px;fill:#475569">OS Layer</text>
<text class="ts" x="22" y="210" text-anchor="middle" transform="rotate(-90,22,210)" style="font-size:10px;fill:#475569">Agent</text>
<text class="ts" x="22" y="370" text-anchor="middle" transform="rotate(-90,22,370)" style="font-size:10px;fill:#475569">Classify</text>
<text class="ts" x="22" y="510" text-anchor="middle" transform="rotate(-90,22,510)" style="font-size:10px;fill:#475569">Storage</text>
<text class="ts" x="22" y="640" text-anchor="middle" transform="rotate(-90,22,640)" style="font-size:10px;fill:#475569">Output</text>

<!-- Row 1: OS signals -->
<g class="node c-gray">
  <rect x="55" y="30" width="155" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="133" y="52" text-anchor="middle" dominant-baseline="central">Active window</text>
</g>
<g class="node c-gray">
  <rect x="263" y="30" width="155" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="341" y="52" text-anchor="middle" dominant-baseline="central">Idle detection</text>
</g>
<g class="node c-gray">
  <rect x="471" y="30" width="155" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="549" y="52" text-anchor="middle" dominant-baseline="central">Window title</text>
</g>

<!-- OS → Agent -->
<line x1="133" y1="74" x2="240" y2="128" class="arr" marker-end="url(#arrow)"/>
<line x1="341" y1="74" x2="341" y2="128" class="arr" marker-end="url(#arrow)"/>
<line x1="549" y1="74" x2="444" y2="128" class="arr" marker-end="url(#arrow)"/>

<!-- Row 2: Agent -->
<g class="node c-purple">
  <rect x="170" y="128" width="342" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="341" y="150" text-anchor="middle" dominant-baseline="central">Local agent daemon</text>
  <text class="ts" x="341" y="169" text-anchor="middle" dominant-baseline="central">Python · psutil · pynput · runs in background</text>
</g>

<!-- Agent → Classifiers -->
<line x1="341" y1="184" x2="341" y2="240" class="arr" marker-end="url(#arrow)"/>

<!-- Row 3: Classifiers -->
<g class="node c-teal">
  <rect x="55" y="248" width="192" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="151" y="270" text-anchor="middle" dominant-baseline="central">Rule engine</text>
  <text class="ts" x="151" y="289" text-anchor="middle" dominant-baseline="central">YAML · VSCode → Work</text>
</g>
<g class="node c-amber">
  <rect x="435" y="248" width="192" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="531" y="270" text-anchor="middle" dominant-baseline="central">AI classifier</text>
  <text class="ts" x="531" y="289" text-anchor="middle" dominant-baseline="central">Claude API · optional</text>
</g>

<line x1="291" y1="276" x2="249" y2="276" class="arr" marker-end="url(#arrow)"/>
<line x1="391" y1="276" x2="433" y2="276" class="arr" marker-end="url(#arrow)"/>

<!-- Classifiers → Storage -->
<line x1="151" y1="304" x2="240" y2="368" class="arr" marker-end="url(#arrow)"/>
<line x1="531" y1="304" x2="444" y2="368" class="arr" marker-end="url(#arrow)"/>

<!-- Row 4: Storage -->
<g class="node c-blue">
  <rect x="170" y="376" width="342" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="341" y="398" text-anchor="middle" dominant-baseline="central">SQLite local database</text>
  <text class="ts" x="341" y="417" text-anchor="middle" dominant-baseline="central">sessions · categories · daily_summary</text>
</g>

<!-- Storage → Processor -->
<line x1="341" y1="432" x2="341" y2="496" class="arr" marker-end="url(#arrow)"/>

<!-- Row 5: Processor -->
<g class="node c-coral">
  <rect x="170" y="496" width="342" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="341" y="518" text-anchor="middle" dominant-baseline="central">Processor</text>
  <text class="ts" x="341" y="537" text-anchor="middle" dominant-baseline="central">Daily aggregation · insights · Pandas</text>
</g>

<!-- Processor → Outputs -->
<line x1="341" y1="552" x2="341" y2="608" class="arr" marker-end="url(#arrow)"/>

<!-- Row 6: Outputs -->
<g class="node c-green">
  <rect x="55" y="616" width="172" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="141" y="638" text-anchor="middle" dominant-baseline="central">Dashboard</text>
  <text class="ts" x="141" y="657" text-anchor="middle" dominant-baseline="central">Streamlit · charts</text>
</g>
<g class="node c-green">
  <rect x="255" y="616" width="172" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="341" y="638" text-anchor="middle" dominant-baseline="central">Timesheet export</text>
  <text class="ts" x="341" y="657" text-anchor="middle" dominant-baseline="central">CSV · PDF</text>
</g>
<g class="node c-green">
  <rect x="455" y="616" width="172" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="541" y="638" text-anchor="middle" dominant-baseline="central">Insights report</text>
  <text class="ts" x="541" y="657" text-anchor="middle" dominant-baseline="central">Peak hours · patterns</text>
</g>

<line x1="265" y1="644" x2="229" y2="644" class="arr" marker-end="url(#arrow)"/>
<line x1="419" y1="644" x2="453" y2="644" class="arr" marker-end="url(#arrow)"/>

<!-- Divider -->
<line x1="55" y1="706" x2="626" y2="706" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

<!-- Legend -->
<text style="font-size:10px;fill:#475569;letter-spacing:0.1em" x="55"  y="726">LAYER</text>
<text style="font-size:10px;fill:#475569;letter-spacing:0.1em" x="210" y="726">COLOR</text>
<text style="font-size:10px;fill:#475569;letter-spacing:0.1em" x="360" y="726">PURPOSE</text>

<rect x="55" y="738" width="10" height="10" rx="2" fill="#2c2c2a" stroke="#5f5e5a" stroke-width="0.5"/>
<text class="ts" x="72" y="747">OS signals</text>
<text class="ts" x="210" y="747" style="fill:#888780">Gray</text>
<text class="ts" x="360" y="747">Raw data from the operating system</text>

<rect x="55" y="758" width="10" height="10" rx="2" fill="#26215c" stroke="#534ab7" stroke-width="0.5"/>
<text class="ts" x="72" y="767">Agent</text>
<text class="ts" x="210" y="767" style="fill:#7f77dd">Purple</text>
<text class="ts" x="360" y="767">Background daemon — collects and routes</text>

<rect x="55" y="778" width="10" height="10" rx="2" fill="#04342c" stroke="#0f6e56" stroke-width="0.5"/>
<rect x="70" y="778" width="10" height="10" rx="2" fill="#412402" stroke="#854f0b" stroke-width="0.5"/>
<text class="ts" x="88" y="787">Classifiers</text>
<text class="ts" x="210" y="787" style="fill:#1d9e75">Teal</text>
<text class="ts" x="248" y="787" style="fill:#64748b"> / </text>
<text class="ts" x="260" y="787" style="fill:#ba7517">Amber</text>
<text class="ts" x="360" y="787">Rules first · AI as fallback</text>

<rect x="55" y="798" width="10" height="10" rx="2" fill="#042c53" stroke="#185fa5" stroke-width="0.5"/>
<text class="ts" x="72" y="807">Storage</text>
<text class="ts" x="210" y="807" style="fill:#378add">Blue</text>
<text class="ts" x="360" y="807">SQLite — all data stays local</text>

<rect x="55" y="818" width="10" height="10" rx="2" fill="#173404" stroke="#3b6d11" stroke-width="0.5"/>
<text class="ts" x="72" y="827">Outputs</text>
<text class="ts" x="210" y="827" style="fill:#639922">Green</text>
<text class="ts" x="360" y="827">Dashboard · timesheets · insights</text>
</svg>

</body>
</html>
